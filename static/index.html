<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noise Toolkit | Adaptive Denoising Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c111d;
            --card-bg: rgba(21, 29, 45, 0.6);
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        header { padding: 2rem 4rem; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); backdrop-filter: var(--glass-blur); position: sticky; top: 0; z-index: 50; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1000px; margin: 4rem auto; padding: 0 2rem; }
        .hero { text-align: center; margin-bottom: 4rem; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; }
        .hero p { color: var(--text-dim); }

        .upload-card { background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border); border-radius: 24px; padding: 3rem; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .btn-upload { background: var(--primary); color: white; padding: 0.8rem 2rem; border-radius: 12px; border: none; cursor: pointer; margin-top: 1rem; font-weight: 600; }

        #results-section { display: none; margin-top: 3rem; }
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .img-container { background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .img-container h3 { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; text-transform: uppercase; }
        .img-container img { width: 100%; max-height: 500px; object-fit: contain; border-radius: 4px; display: block; }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .metric-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); padding: 1.5rem; border-radius: 16px; }
        .metric-card span { display: block; color: var(--text-dim); font-size: 0.875rem; }
        .metric-card strong { font-size: 1.5rem; color: #fff; }

        .loader { display: none; width: 48px; height: 48px; border: 4px solid rgba(255, 255, 255, 0.1); border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 2rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header><div class="logo">NoiseKit AI Core</div></header>
    <main class="container">
        <section class="hero"><h1>Adaptive Denoising</h1><p>Intelligent, threshold-aware noise removal engine.</p></section>
        <div class="upload-card" id="drop-zone">
            <p>Select a noisy photo to begin adaptive processing</p>
            <button class="btn-upload">Upload Image</button>
            <input type="file" id="file-input" style="display:none;" accept="image/*">
        </div>
        <div class="loader" id="loader"></div>
        <section id="results-section">
            <div class="comparison-grid">
                <div class="img-container"><h3>Original</h3><img id="p-orig" src=""></div>
                <div class="img-container"><h3>Denoised</h3><img id="p-den" src=""></div>
            </div>
            <div class="metrics-grid">
                <div class="metric-card"><span>Detected Noise</span><strong id="m-type">-</strong></div>
                <div class="metric-card"><span>Confidence</span><strong id="m-conf">-</strong></div>
                <div class="metric-card"><span>MSE</span><strong id="m-mse">-</strong></div>
                <div class="metric-card"><span>PSNR</span><strong id="m-psnr">-</strong></div>
            </div>
            <div style="text-align: center; margin-top: 3rem;"><button class="btn-upload" onclick="location.reload()">Upload New</button></div>
        </section>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultsSection = document.getElementById('results-section');
        const loader = document.getElementById('loader');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { const file = e.target.files[0]; if (file) handleUpload(file); };

        async function handleUpload(file) {
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('p-orig').src = e.target.result; };
            reader.readAsDataURL(file);

            dropZone.style.display = 'none';
            document.querySelector('.hero').style.display = 'none';
            loader.style.display = 'block';

            const formData = new FormData(); formData.append('file', file);
            try {
                const response = await fetch('/denoise', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                document.getElementById('p-den').src = data.processed_image;
                document.getElementById('m-type').innerText = data.detected_noise.toUpperCase();
                document.getElementById('m-conf').innerText = (data.confidence * 100).toFixed(0) + '%';
                document.getElementById('m-mse').innerText = data.mse.toFixed(2);
                document.getElementById('m-psnr').innerText = data.psnr.toFixed(2) + ' dB';

                loader.style.display = 'none';
                resultsSection.style.display = 'block';
            } catch (err) { alert(err.message); location.reload(); }
        }
    </script>
</body>
</html>
